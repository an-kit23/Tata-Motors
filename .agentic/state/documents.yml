  text: "Release 2024 / 05\n\nOverview\n\nIntroduction \n\nThis Statement of Work\
    \ (“SOW”) SOW04098753 describes a set of services (“Professional Services”) to\
    \ be provided by SFDC to the Customer as defined below.  SFDC reserves the right\
    \ to reject an SOW if not signed by 30-06-2025.   \n\n“Customer”\n\nCustomer:\
    \ ADITYA BIRLA CAPITAL LIMITED located at GCorp Tech Park 13th Floor,Next to Hypercity\
    \ Mall, GCorp Ghodbunder Road,Mumbai, Thane [West], Maharashtra, 400601\n\nCustomer\
    \ Sponsor or Contracts Administrator: \n\nCustomer Billing/Invoicing Contact:\
    \  Pooja Sharma, GCorp Tech Park 13th Floor,Next to Hypercity Mall, GCorp Ghodbunder\
    \ Road,Mumbai, Thane [West], Maharashtra, 400601, pooja.sharma@adityabirlacapital.com\n\
    \n“SFDC”\n\nSFDC Legal Entity:  Salesforce.com India Private Limited, a company\
    \ incorporated under the provisions of the Companies Act, 1956 of India\n\nSFDC\
    \ Primary Sales Contact:  Ravikiran Achuthakumar, rachuthakumar@salesforce.com\n\
    \nDefinitions\n\nAll capitalized terms not defined in this SOW will have the meaning\
    \ set forth in the Agreement.   \n\n“Agreement” means the Professional Services\
    \ Agreement found at https://www.salesforce.com/company/legal/customer-agreements/\
    \    \n\n“Application” means any online, web-based services and offline, on-premises\
    \ components made available by SFDC or any SFDC Affiliate to Customer under a\
    \ separate agreement in effect between Customer and SFDC or any SFDC Affiliate.\
    \  \n\n“Change Order” is a formal amendment to this SOW generated by SFDC and\
    \ signed by both parties.\n\n“Effective Date” shall be the latter of the parties’\
    \ respective execution dates of this SOW and the Purchase Order, if required by\
    \ Customer or SFDC, is received. \n\n“Fees” means the Professional Services fees\
    \ pursuant to the performance of this SOW. \n\n“SOW Term” means the duration for\
    \ the performance of the Professional Services pursuant to this SOW and any Change\
    \ Order.\n\n“T&E” means all travel-related and other expenses, including but not\
    \ limited to transportation, mileage, and reasonable out-of-pocket expenses, incurred\
    \ by SFDC in performance of the Professional Services.  \n\nScope\n\nSubject to\
    \ the terms of this SOW and the Agreement, SFDC will provide the Professional\
    \ Services set forth below in this Section 2.  \n\nCustomer’s Goals\n\nThe Customer’s\
    \ high-level business objectives for these Professional Services are summarized\
    \ below.  These objectives are for informational purposes only and not an obligation\
    \ of Customer or SFDC.  \n\nAt a high-level, the Customer hopes to achieve the\
    \ following business objectives:  \n\nImplement a unified Lead Management System\
    \ (LMS) which can scale in line with the business needs.  \n\nHigh adoption of\
    \ the new LMS system  \n\nImplementation Services\n\nSFDC will configure the Application\
    \ as outlined below (“Implementation Services”) using SFDC’s delivery methodology\
    \ described in Section 3.\n\nLMS and Quick Data Entry (QDE) implementation will\
    \ support the following Aditya Birla Finance Limited (ABFL) business segments/Business\
    \ Units (BU) and loan products or Lines of Business (LOB) within them. \n\nBusiness\
    \ Unit/Business Segment - Retail\n\nPersonal Loan (PL)\n\nUnsecured Business Loan\
    \ (UBL)\n\nMico Loan against Property (MLaP)\n\nSmall Ticket Unsecured Loan (STUL)\n\
    \nSmall Ticket Secured Loan (STSL)\n\nDoctor Loan\n\nBusiness Unit/Business Segment\
    \ - Small and Medium Enterprise (SME)\n\nLoan against Property (LAP)\n\nSmall\
    \ Enterprise Group (SEG)\n\nLoan against Solar\n\nLoan against Machinery\n\nConstruction\
    \ Finance\n\nSupply Chain Finance (SCF)\n\n           Implementation will be done\
    \ in five (5) releases -\n\n           Release 1 - LMS for Retail Products & Supply\
    \ Chain Finance (SCF)\n\nPL\n\nUBL\n\nMLaP\n\nSTUL\n\nSTSL\n\nDoctor Loan\n\n\
    SCF\n\n           Release 2 - QDE for PL product\n\n           Release 3 - QDE\
    \ for Rest of Retail Products & SCF\n\nUBL\n\nMLaP\n\nSTUL\n\nSTSL\n\nDoctor Loan\n\
    \nSCF\n\n           Release 4 - LMS and QDE for SME Business\n\nLAP\n\nSEG\n\n\
    Loan against Solar\n\nLoan against Machinery\n\nConstruction Finance\n\n     \
    \      Release 5 - Straight Through Processing (STP) for Retail and SME products\n\
    \nEnable STP process for Pre-approved/Pre-Qualified offers for Retail and SME\
    \ business\n\nRelease 1, 2 & 3 - Discovery, Design, Foundation Build for Retail\
    \ Business.\n\nRelease 2 - Delta Discovery, Extend Release 1, 2 & 3 build to SME\
    \ Business.\n\nRelease 5 - Enable STP process for Pre-approved/Pre-Qualified (PAPQ)\
    \ offers for Retail and SME businesses.\n\n2.2 Implementation Services \n\nSFDC\
    \ will configure the Application as outlined below (“Implementation Services”)\
    \ using SFDC’s delivery methodology described in section 3.2 in this SOW. \n\n\
    2.2.1 Functional Scope – Core Salesforce Platform (Sales Cloud) - Lead Management\
    \ System (LMS) and Quick Data Entry (QDE) for Retail and SME Businesses\n\nSFDC\
    \ will use a combination of standard configuration tools and custom code to design,\
    \ specify, develop and configure the following currently anticipated functionality\
    \ as integrated modules within the Application: \n\n2.2.2.     Integrations -\
    \ LMS and QDE\n\nSFDC will work with Customer to implement the following data\
    \ integrations. Any additional integration touchpoints needed will go through\
    \ the Change Control Process. The table below lists system names and high level\
    \ approaches.\n\n2.2.3 RACI\n\nThe following table provides reference for parties\
    \ Responsible, Accountable, Consulted or Informed for tasks within the Professional\
    \ Services. These are to be considered binding scope in conjunction with the assumptions\
    \ and exclusions in section 2.3.1 General Scope Assumptions and 2.3.2 Scope Exclusions.\n\
    \n2.2.5 Dependencies \n\nTimely completion of activities as per the plan defined\
    \ in Appendix 1 is dependent on Customer and certain third-party  dependencies\
    \ and project pre-requisites. The drop dead dates for these dependencies would\
    \ be provided by SFDC Project Manager. Delays in relation to these dependencies\
    \ and pre-requisites will be managed through the Change Control process (refer\
    \ to section 7.1)\n\nIntegrations - The following details need to be made available\
    \ by Customer -\n\nAPI specifications for API’s that would be consumed by the\
    \ Application, before the start of the design phase of the project. \n\nSample\
    \ request and response for the purpose of development before the start of the\
    \ design phase of the project. \n\nProduction ready API’s before the commencement\
    \ of build phase of the each release of the project (as per the release breakdown\
    \ for integrations defined in section 2.2.2)\n\nAll the data required for testing\
    \ purposes of the integrations in the sandbox environments before the commencement\
    \ of build phase of the project..\n\nCustomer’s business teams should be available\
    \ for workshops and user story sign offs as per user story grooming schedule to\
    \ be published by SFDC Project Manager before the commencement of the define phase.\
    \ \n\nFinalized Business Process flows signed off by Customer will be available\
    \ before commencement of the design phase of the project. Business Process Flows\
    \ must have detailed process explanations and detailed validations for all happy\
    \ and failure paths  \n\nCustomer will have a single Product Owner, who will provide\
    \ the final signoff on business requirements including but not limited to Unified\
    \ Business process flow, any sub-flows or flow variations specific to individual\
    \ LoB’s, user stories etc.\n\nCustomer will identify and align one Single Point\
    \ on Contact (SPOC’s) each for Change Management, super user training, middleware/gateway/integrations,\
    \ IT Infrastructure and Security before commencement of the project. \n\nSIT and\
    \ UAT to be completed in the time frame as per the schedule set out in Appendix\
    \ 1\n\nList of artifacts which Customer is expected to provide to SFDC team within\
    \ the stipulated time defined in the table below:\n\nField Lists per stage & persona\
    \ combination as per what is available basis current systems\n\nList of documents\
    \ to be collected in QDE process\n\nNotification content for SMS/Email &/or Template\
    \ ID as appropriate\n\nIn relation to integrations:\n\nMapping details\n\nIntegration\
    \ specifications (request/response) with working endpoints and credentials\n\n\
    Integration strategy approval and project timelines for building any new integrations\
    \ and orchestrations on Customer middleware if not already available.\n\nIn relation\
    \ to master data:\n\nFinal list of masters and sample master data structures with\
    \ field definitions before the commencement of design phase of the project.\n\n\
    Actual master data in specified formats needs to be provisioned before commencement\
    \ of the build phase of the project.\n\nCustomer internal teams will do the Infrastructure\
    \ & Integrations set up as and when required by SFDC.\n\nCustomer IT team will\
    \ ensure sufficient governance is in place to monitor, validate and agree on any\
    \ additional functionalities requested by Customer’s business teams, scope complexity\
    \ change, delays in providing requirements, delays in providing feedback/sign\
    \ offs on SFDC deliverables. Subject to Section 7.1, SFDC will discuss and align\
    \ with Customer IT team on a change request in the aforementioned scenarios, which\
    \ will then be managed through Change Control Process. \n\nThe integration plan\
    \ will be defined and aligned during the Design phase of the project. In the event\
    \ that completion of an integration touchpoint or any other task defined above\
    \ is delayed due to missed dependency dates from the Customer or a 3rd party,\
    \ the required  extended timeline will go through the change control process as\
    \ defined in section 7.1.  \n\n2.3 Additional Services  \n\nThe scope described\
    \ in this section consists of consultation-based services from SFDC personnel\
    \ with expertise in specific subject  areas. These additional services are deemed\
    \ accepted upon delivery.  \n\n2.3.1 Scope Assumptions and Exclusions\n\nIntegrations\
    \ \n\nA total of one hundred and seventy (170) integration touch points across\
    \ sixty nine (69) systems - forty three (43) in Release 1, forty five (45) in\
    \ Release 2, forty eight (48) in Release 3, seventeen (17) in Release 4 and seventeen\
    \ (17) touch points in Release 5 are included in scope of this implementation.\
    \ Any additional integration touch-points to be included in scope will have commercial\
    \ and implementation timeline impact which needs to be managed through Change\
    \ Control Process.\n\nCustomer will share the final list of integration touch-points\
    \ and system details prior to commencement of discovery/define phase of the project.\
    \ SFDC and Customer will deliberate and finalize the final list of integration\
    \ touch points to be developed in each release. If the identified touch points\
    \ exceed the numbers defined for each release, it will have an impact on the implementation\
    \ timelines for the specific release. \n\nA dedicated UAT timeline of two (2)\
    \ weeks each for Releases 1, 2 and 3 and UAT timeline of one (1) week each for\
    \ Releases 4 and 5 has been factored into the implementation plan. Any additional\
    \ time for UAT will have an impact on the overall delivery timelines and commercials,\
    \ which needs to be managed through Change Control Process.  \n\nIntegration approach\
    \ and  strategy including integration through ESBs/Middleware, Point to Point\
    \ requirements will be finalized during the  define and design phase. It is recommended\
    \ that all the integrations will be done using Customer ESB’s or middleware. Any\
    \ use cases requiring point to point integration will be evaluated during the\
    \ define and design phase  and the approach will be finalized for the same. \n\
    \nAny external service can only be integrated to Application if a valid consumable\
    \ API is provided by the service  provider. \n\nFor integration patterns using\
    \ Platform Events, Customer middleware will subscribe to the SFDC event bus to\
    \ read data.\n\nSFDC project team will require support from Customer team regularly\
    \ for integration related activities - exposing APIs, API Documentation, co-ordination\
    \ for unit test during development, integration testing etc. Customer would make\
    \ time available from their IT team/ SMEs/ 3rd Party vendors for the same. Customer\
    \ will be responsible for communication and availability of IT team/ SMEs/ 3rd\
    \ Party vendors for integration.\n\nCustomer owns the timely availability of Customer\
    \ application APIs and coordination with the respective application team.\n\n\
    It is assumed that Customer Middleware WS02/AWS API gateway will be able to support\
    \ event handling, protocol conversion, transformation, queuing, orchestration,\
    \ transaction encryption, signing, long polling requirements.\n\nCustomer will\
    \ help to ensure all integrating partners are available and participating during\
    \ the development and  testing life cycle. Any necessary firewall changes to allow\
    \ SFDC to be able to access on premise services will be  done by Customer. \n\n\
    Project Management\n\nJIRA (Customer provided tool) will be the single source\
    \ of truth for project tracking and project lifecycle management.\n\nCustomer\
    \ will nominate a single point of contact to coordinate the meetings/training\
    \ and for managing the signoff on all project deliverables shared and submitted\
    \ by SFDC.\n\nCustomer will be responsible for communicating any major business\
    \ change activities, prior to such activity with sufficient lead time, to enable\
    \ appropriate impact assessment and change control with Salesforce.\n\nAny internal\
    \ or external partner dependencies will be mutually agreed to by Customer and\
    \ Salesforce.\n\n Bulk Upload Features \n\nApplication will not support any data\
    \ uploads using excel files. Any data upload will be done using pre-defined format\
    \ CSV files.\n\nData load will be done through the standard import wizard. UI\
    \ of import wizard is not customizable and should be used as is. \n\n● \tSoftware\
    \ Procurement and Infrastructure \n\nCustomer will be responsible for obtaining\
    \ any third-party products licenses like JIRA, Middleware, ETL,  AppExchange packages\
    \ as required during the implementation. \n\nCustomer is responsible for management\
    \ of Application instances and related administration activities post Go  Live.\
    \ SFDC will configure all the environments during the implementation phase. \n\
    \nCustomer acknowledges and agrees that Customer systems or Third party applications\
    \ are developed independent  of SFDC. SFDC has no responsibility for Customer\
    \ or third party systems used by Customer and anything related  to the performance\
    \ or functionality of such applications’ is not the responsibility of SFDC; ii)\
    \ SFDC shall only be  responsible for the Professional Services pursuant to this\
    \ SOW as set forth herein. \n\nCustomer will be responsible for any failover and\
    \ disaster recovery environments needed.\n\nCustomer is responsible for the retirement\
    \ and decommissioning of the existing system, if any.\n\nCustomer should provide\
    \ access for Salesforce  personnel to all connectivity tools necessary to facilitate\
    \ effective and efficient operations. \n\nFor any access to production environment,\
    \ Customer will apply necessary data & information security procedures to provide\
    \ required confidentiality of sensitive information, like data masking, controlled\
    \ access at login-id levels, maintain audit trails or other data and information\
    \ security procedures as applicable or in use at Customer environment.\n\n● \t\
    Testing  \n\nSFDC will perform unit, system & integration testing of features\
    \ developed as a part of the project.\n\nSFDC will provide the list of test cases\
    \ executed during functional testing along with pass percentage, screenshots wherever\
    \ applicable.\n\nCustomer will lead and perform UAT, with SFDC aiding defect triage\
    \ with the required support from Customer. Any increase in the UAT duration beyond\
    \  what is estimated in the project schedule will impact the project delivery\
    \ timeline and will have incremental cost to  be borne by Customer, which needs\
    \ to be managed with the standard change control process (Refer to section  7.1)\
    \ \n\nCustomer will be responsible to perform security and reliability testing\
    \ as applicable for both web and mobile platforms \n\nSFDC will support Customer\
    \ in timely preparation of any documentation required for Infosec/Appsec approvals,\
    \ with inputs as required from Application perspective.\n\n                  ●\t\
    Knowledge Transfer and SME Support\n\nKnowledge transfer on the current systems\
    \ will be provided by Customer to SFDC during the Discovery phase.\n\nCustomer\
    \ will provide timely access to relevant documentation and data necessary for\
    \ performing project activities\n\nCustomer SMEs related to processes will be\
    \ required to provide support throughout the project life cycle for activities\
    \ including but not limited to Application design, UAT support, periodic reviews\
    \ of project deliverables.\n\nCustomer will provide the necessary support for\
    \ any applications (internal or external) being integrated to Application either\
    \ maintained by Customer or any third party vendors. This support will be provided\
    \ in a timely manner. Any delay in resolving issues related to integrated applications\
    \ will have an impact on the project timelines and commercials.\n\n          \
    \           ●  Devops and Release Management\n\nSFDC will have access to SIT,\
    \ UAT and PROD environments. Customer will own release and environment management.\
    \ \n\nSFDC will use the Salesforce DevOps Center or CI/CD tools and setup provided\
    \ by Customer for source control, pipelines and release management.\n\nProject\
    \ Management tool/ Requirement documentation tool will be provisioned by Customer\
    \ and made available to SFDC resources.\n\nAll required tools and accesses will\
    \ be provisioned at the commencement of the project.\n\n Others \n\nFinal requirements\
    \ for implementation will be finalized during the define phase of the project.\
    \ Detailed discovery phase will be followed by a replan and estimate of the scope\
    \ to validate complexity and scope assumptions. Any deviation in scope from what\
    \ has been detailed in section 2.2 will have an impact on effort and commercials,\
    \ which will then be mutually agreed between SFDC and  Customer and will be handled\
    \ through the Change Control Process (Refer to section 7.1). \n\nPrimary business\
    \ process flow across all products (Retail/SME) will remain the same and a unified\
    \ LMS and QDE journey will be implemented for all the twelve (12) loan products/LoBs\
    \ in scope of this implementation. Finalized Business Process flows signed off\
    \ by Customer will be available before commencement of the design phase of Release\
    \ 1 of the project. Business Process Flows must have detailed process explanations\
    \ and detailed  validations for all happy and failure paths. \n\nThe variations\
    \ in the Lead and QDE journey for the loan products/LoBs will only be at lead\
    \ creation, lead assignment and QDE stage only. Minor variations with respect\
    \ to fields, field validations, additional steps in a flow or a sub flow will\
    \ exist for individual LoB and the same will be incorporated within the unified\
    \ primary flow. \n\nAny journey post QDE basis the customer eligibility will be\
    \ submitted to the respective LOS application through integration (refer to section\
    \ 2.2.1 and 2.2.2 for details on existing Customer LOS systems) for further processing.\
    \ Application will only fetch back the status of submitted applications for display\
    \ or tracking purposes.\n\nPartner / DSA Onboarding will be performed outside\
    \ of the Application. \n\nMobile Support for eKYC Biometric requirements will\
    \ be done for Release 1 or 2.\n\nFor Bridge App, enabling eKYC (electronic Know\
    \ your Customer) biometric check using fingerprint scanner functionality has been\
    \ included in the current scope of work. It is assumed that Customer will procure\
    \ and make available the Fingerprint scanner device/biometric device in a timely\
    \ manner and within the build timelines for Release 1 or Release 2. If the Customer\
    \ is not able to procure fingerprint scanner/biometric device in a timeline manner\
    \ or descopes the requirement, the same effort against this deliverable may be\
    \ substituted to deliver Screenshot restriction and Gallery restriction functionality\
    \ on the Bridge App. Only one of Scope A or Scope B for the Bridge app will be\
    \ implemented. The decision for the same will be aligned between SFDC and Customer\
    \ during the define and design phase and will be managed through the Change Control\
    \ Process.\n\nFinal decision on lead scoring methodology (lead scoring using formulas\
    \ or lead scoring using data cloud capabilities) will be taken during the define\
    \ and design phase based on the business requirements.\n\nIntegration with Customer\
    \ HR systems for automatic user setup (activation/deactivation), role or role\
    \ hierarchy sync with Application is currently not considered in scope (refer\
    \ to integrations list section 2.2.2). However if Customer is able to provide\
    \ a production ready consumable API for HRMS/Active Directory system within the\
    \ build schedule as indicated in Appendix 1, SFDC will support implementation\
    \ of the same. The total number of integration touchpoints will be capped at one\
    \ hundred and seventy (170). It is assumed that Customer Active Directory/HRMS\
    \ has required capability to integrate with Application to support user activation/deactivation\
    \ functionalities. \n\nCustomer is responsible for providing appropriately skilled\
    \ resources to assist in the development of the Technical  Architecture, in scope\
    \ integrations and Integration Specifications for non-Salesforce applications\
    \ throughout the  duration of this engagement. \n\nApplication architecture and\
    \ design will be reviewed and approved by SFDC Enterprise Architecture Review\
    \ board and Customer Architecture teams.\n\nAll the scope defined in Section 2\
    \ will be developed in the Sales Cloud org only and is green field implementation.\
    \ \n\nCustomer will provide necessary subject matter experts during the various\
    \ phases of the project to facilitate the development needs. Customer will own\
    \ the system integration testing and user acceptance testing activities and  coordination\
    \ with other partners in integration testing. \n\nCustomer will provide finalised\
    \ requirements in a timely manner to support the creation of user stories during\
    \ the define phase.\n\n                   2.3.2 Scope Exclusions\n\n         \
    \             Any work not specified in this SOW is considered out of scope, including\
    \ but not limited to the following:\n\nAny custom app mobile development/configuration\
    \ except mobile app configuration using mobile publisher.\n\nCustom offline capability\
    \ on Salesforce mobile app.\n\nAny changes to Customer’s existing framework and\
    \ flow for mobile banking and net banking\n\nSalesforce Maps and related requirements\n\
    \nWhatsapp conversations chat\n\nWhatsapp with Agentforce \n\nAny development\
    \ on third-party systems or tools for Remote Process Automation\n\nMarketing Cloud\
    \ related functionalities including but not limited to journeys, push notifications\
    \ and Interaction Studio. However, notifications via SMS, Whatsapp and email will\
    \ be enabled through APIs provided by the Customer.\n\nSales cadence functionalities\
    \ like route optimization and optimization of appointments. \n\nCustom development\
    \ of CTI and console or adapters.\n\nLegacy data migration. All the existing inflight\
    \ leads and loan applications will be closed in respective systems/applications.\n\
    \nAny Do it Yourself journey implementation on Salesforce Platform.\n\nAvailability\
    \ of Application in any language other than English and requirements around language\
    \ translations \n\nAll functionality post QDE is not covered as part of proposal\
    \ like negotiations, pricing approvals, pricing deviations. They will be considered\
    \ as  non STP flow and performed in respective LOS \n\nAny document generation\
    \ requirement including but not limited to document generation for application\
    \ form, sanction letter etc.\n\nIncentive calculation and sales target setting\n\
    \nAny loan servicing related functionalities including loan foreclosures.\n\n\
    Limit Management functionality or module - update limits on loan sanction API,\
    \ update limits on loan application rejection API, re-initiation of rejected application\
    \ API, update limits on loan amount disbursal API.\n\nSales App features like\
    \ Query module. Application will not support any requirement around query management\
    \ on loan applications for additional information or document requests. Query\
    \ management will be managed through existing Customer LOS systems and existing\
    \ processes.\n\nFile based integration with any systems. \n\nCustom API for lead\
    \ creation (inbound integrations) for partners, digital aggregators, leads through\
    \ Customer campaign tools, other digital channels, Government agencies. \n\nDedicated\
    \ support for Closed User Group (CUG) testing. CUG support will be limited to\
    \ addressing queries or clarifications with respect to the current release/technical\
    \ go live in production. SFDC support for CUG will be limited based on the available\
    \ resource capacity. No support will be provided for prior technical go-lives\
    \ and the same will need to be managed by Customer Day 2 support team.\n\nSupport\
    \ for phase wise Pan India rollout.\n\nTraining of end users. \n\nData Cloud -\n\
    \nData modelling\n\nIdentity resolution & Profile unification\n\nCreation of segments\n\
    \nCreation of calculated insights\n\nCreation of activation targets\n\nIntegration\
    \ with any other systems apart from one (1) Salesforce CRM Org (home org) using\
    \ Salesforce Platform native connector\n\nData cleansing & data quality related\
    \ activities\n\nLeveraging any existing models available with Customer for data\
    \ scoring\n\nAny LWC component development\n\nAny custom integration for data\
    \ ingestion\n\nAny data export requirements.\n\nChange management - Customer will\
    \ conduct all Change Management activities, including but not limited to: \n\n\
    stakeholder identification\n\nend user training and preparation of any training\
    \ materials (eg: manuals, deck) for end users; \n\nend user communications and\
    \ \n\nadoption planning and execution \n\nDevops setup/implementation. \n\nExecution\
    \ of performance, scale and load testing. SFDC will assist Customer in triaging\
    \ and fixing any issues coming out of performance, scale, load or security testing\
    \ based on the technical feasibility of the same.\n\nTest automation. \n\nDelivery\
    \ & Schedule\n\nSchedule\n\nSFDC estimates the project to be forty six (46) weeks.\
    \  This estimation is based on SFDC's assumption that it will be able to perform\
    \ the Professional Services without delays initiated by Customer.  A preliminary\
    \ schedule is set forth below (refer to Appendix 1), and a more detailed project\
    \ timeline is produced during the Define stage of the project. The Professional\
    \ Services will begin within approximately two (2) to four (4) weeks after execution\
    \ of this SOW or on a start date as the parties may mutually agree in writing\
    \ (email acceptable).\n\nSalesforce Implementation Services Methodology \n\n \
    \              Salesforce uses the Salesforce Professional Services Methodology\
    \ (\"SPSM\") to provide Implementation Services.  The SPSM involves four stages:\
    \ Define, Design, Deliver, and Deploy. \n\n              This methodology is adaptable\
    \ and tailored to meet each customer's unique needs, incorporating both waterfall\
    \ and agile principles.  The chosen framework depends on the customer's requirements,\
    \ the nature of the engagement, and SFDC's recommendations on best practices.\
    \  During the Define and Design stages, SFDC and Customer will agree on the planned\
    \ approach, including how scope is managed.\n\nAs a part of the Salesforce Professional\
    \ Services Methodology:\n\nSFDC and Customer will document the desired configured\
    \ Application functionality as a list of functional needs by user type (“User\
    \ Stories”).  \n\nDevelopment occurs in a series of regular increments (“Sprints”),\
    \ which include delivery of the solution components and testing of them as they\
    \ are built.  \n\nDevelopment reviews are conducted upon completion of each Sprint\
    \ to measure functional progress and to validate and provide feedback.\n\nOn-going\
    \ User Story prioritization, as mutually agreed in writing (email sufficient),\
    \ between the Customer Product Owner and SFDC, will dictate the final content\
    \ of the configured Application. \n\nCustomer Product Owner (as defined in Section\
    \ 6) may request additional or alternative functionality based on the prioritization\
    \ of User Stories as they are refined and developed during Delivery of the configured\
    \ Application.  Consequently, the precise scope of the configured Application\
    \ cannot be determined at the outset of the Implementation Services and the detailed\
    \ scope described above may not be completed as part of the Implementation Services.\
    \  \n\nDefine & Design Stages\n\nBefore the Define & Design stages, SFDC prepares\
    \ a set of risks, assumptions, project goals, objectives, constraints, success\
    \ metrics, and stakeholders. \n\nDuring Define & Design, SFDC starts the project\
    \ and collaboratively establishes the Customer's goals and targeted business outcomes.\
    \  SFDC and Customer will also outline how the project will be managed and the\
    \ plan for execution, including scope, resources, schedule, budget, and quality\
    \ testing.  The Define and Design stages establish the high-level architecture\
    \ necessary to begin the Deliver stage.  SFDC documents the solution's business\
    \ and technical components so the Customer can provide formal approval.  The Define\
    \ & Design stage activities often happen concurrently.  If mutually agreed upon,\
    \ the Deliver stage can begin before the Define and Design stages close.\n\nDuring\
    \ the Define & Design stage, SFDC will coordinate the following meetings to occur\
    \ sequentially.  \n\nProject Team Alignment: SFDC and Customer teams confirm an\
    \ initial understanding of the project's scope, undertake preliminary planning,\
    \ align roles, and project tracking and control mechanisms. \n\nKickoff Meeting\
    \ and Methodology Alignment: The teams align on critical elements of SPSM. SFDC\
    \ facilitates discovery sessions to create the initial backlog of User Stories.\
    \ \n\nTechnical Architecture and Integration Analysis: SFDC analyzes the technical\
    \ requirements for the Implementation Services. \n\nBuild Preparation: Finally,\
    \ the team makes the preparations to begin the solution delivery, including:\n\
    \nEnvironments are initialized and configured;\n\nDevelopment and code management\
    \ tracking and management systems are acquired and set up;  \n\nSufficient mutually\
    \ agreed User Stories to start development (typically at least enough for two\
    \ (2) Sprints).\n\nDefine & Design Deliverables\n\nPlanning Documents establish\
    \ a baseline plan for designing and configuring the Application and refining the\
    \ scope, customer requirements, and preliminary delivery dates. Once mutually\
    \ approved, Planning Documents are a reference point for governing the project's\
    \ scope, schedule, budget, and deliverables.  Planning Documents include: \n\n\
    Project Management Plan: defines the processes by which the project will be managed.\
    \ \n\nBaseline Schedule:  establishes an initial timeline and budget against which\
    \ to monitor schedule and budget burn performance.  The Baseline Schedule is based\
    \ on this SOW, information gathered during project initiation, project team members’\
    \ schedules, and calendar events.  \n\nWork Break Down Structure (WBS):  A hierarchical\
    \ representation of the planned scope of the project and SFDC and Customer responsibilities.\
    \   For agile-leaning approaches, the WBS will be high level with many scope details\
    \ not yet known or documented.\n\nDesign Documents describe the overall design\
    \ and functional scope of the configured Application.  Once the Design Documents\
    \ are approved, SFDC will begin the Deliver stage.  In agile-leaning projects,\
    \ the high-level solution design and story map may be finalized after the start\
    \ of the Deliver stage.  The Design Documents include: \n\nHigh-Level Solution\
    \ Design:  Outlines the modules and functionality (including custom or external\
    \ technologies, if in scope) needed to address the Customer's project requirements.\
    \ SFDC will work with the Customer to review design decisions and trade-offs in\
    \ interactive sessions as appropriate to arrive at the solution design for the\
    \ Customer.  For Agile projects, the solution design is less detailed and will\
    \ not be finalized before the Deliver stage.\n\nUser Profile Matrix: Outlines\
    \ the defined user roles and the features, functions and data each can access.\n\
    \nObject Model Design:  Documents the objects to be configured and the relationships\
    \ between them.\n\nStory Map and Product Backlog:   SFDC and the Customer's Product\
    \ Owner will create a Story Map based on the SOW and discovery sessions. It will\
    \ model primary functional areas in a hierarchical framework of User Stories.\
    \ Known User Stories will be elaborated, but some details may finalize later in\
    \ the project. For Agile projects, the Story Map will finalize after the Deliver\
    \ stage begins..\n\nRe-baselined Schedule:  the schedule will be reviewed and\
    \ revised based on the approved Planning Documents and approved Design Documents.\n\
    \nDeliver Stage\n\nThe Deliver stage can begin before the Define & Design stages\
    \ are fully completed if mutually agreed by the Customer and SFDC in the Planning\
    \ Documents.\n\nThe Deliver stage is where SFDC configures, develops, and tests\
    \ the Application over a series of development Sprints based on the product backlog\
    \ of User Stories, Planning Documents, and Design Documents.  During each Sprint,\
    \ SFDC and Customer select User Stories, finalize design, build and test the functionality,\
    \ execute test scripts, and obtain acceptance. SFDC will unit test the configured\
    \ Application and independently create test cases to validate that conformity\
    \ to the defined acceptance criteria. SFDC and Customer also will conduct Sprint\
    \ Review meetings for specified Sprints to enable the Customer to provide feedback.\n\
    \nThe Customer is responsible for conducting System Integrated Testing (SIT) and\
    \ User Acceptance Testing (UAT) and providing feedback and acceptance. SFDC will\
    \ help to coordinate and facilitate SIT and UAT.  After the completion of final\
    \ Customer UAT, SFDC will work with the Customer to confirm the agreement to deploy\
    \ the configured Application to the production environment.\n\nDeliver Stage Deliverables\n\
    \nConfigured Application: Version of the Application that is implemented according\
    \ to the approved Design Documents.\n\nUAT Completion: Customer’s notification\
    \ of UAT completion, final acceptance of the configured Application, and agreement\
    \ to deploy into the production environment.\n\nDeploy Stages\n\nFollowing Customer\
    \ agreement to go-live, the configured Application will be migrated to Production,\
    \ based on deployment instructions created by SFDC.  The responsibility for production\
    \ deployment is defined in Section 2. \n\nFollowing deployment, SFDC will update\
    \ and publish a final version of the deployment checklist to reflect the completed\
    \ Implementation Services and the actual results of the production deployment.\
    \  \n\nDeploy Stage Deliverables\n\nDeployment Plan:  Documents the approach to\
    \ deploying the configured Application, code, and functionality to the Customer’s\
    \ production environment.\n\nDeployed Production Application: Migrated configured\
    \ Application deployed to the production environment.  \n\nUser Stories Documentation\
    \ / Product Backlog:  Documents reflecting final version of the accepted User\
    \ Stories that are implemented as part of the configured Application.\n\nConfigured\
    \ Application Documentation:  provided as defined in Section 2.\n\nAcceptance\n\
    \nUpon completion of each Deliverable, SFDC will, as applicable: (a) submit a\
    \ complete copy of such Deliverable to Customer; and (b) at Customer’s request,\
    \ demonstrate such Deliverable’s functionality to Customer.  Customer is responsible\
    \ for reviewing and testing all Deliverables in accordance with this SOW pursuant\
    \ to any acceptance criteria and test plans mutually agreed upon in writing by\
    \ the parties for such Deliverable.  Customer will provide SFDC with written notification\
    \ of acceptance for each Deliverable promptly upon acceptance; however, failure\
    \ to reject a Deliverable, as set forth below, is deemed acceptance.  If Customer,\
    \ in its reasonable and good faith judgment, determines that any submitted Deliverable\
    \ does not satisfy the agreed-upon acceptance criteria as specified in this SOW\
    \ or as mutually agreed upon in writing by the parties for such Deliverable, Customer\
    \ must so notify SFDC in writing within ten (10) business days after SFDC’s submission\
    \ of the Deliverable, specifying the deficiencies in detail.  SFDC will use commercially\
    \ reasonable efforts to correct such deficiencies and resubmit the Deliverable\
    \ to Customer as soon as practicable.  Customer will again review and test the\
    \ Deliverable against such agreed-upon acceptance criteria and detail any deficiencies\
    \ to SFDC in writing within ten (10) business days after resubmission of the Deliverable.\
    \  If a Deliverable fails to meet such acceptance criteria specified in this SOW\
    \ after its second (2nd) resubmission to Customer, Customer may either, as its\
    \ sole and exclusive remedy: (i) again reject the Deliverable and return it to\
    \ SFDC for further correction and resubmission in accordance with the process\
    \ described above (and if the Deliverable is not accepted after two (2) resubmissions,\
    \ the matter is escalated to Customer’s executive sponsor for the project associated\
    \ with this SOW and the SFDC Project Manager or Engagement Manager), or (ii) terminate\
    \ this SOW immediately upon written notice and recover all fees paid under this\
    \ SOW for such deficient Deliverable.  If the parties determine that a Deliverable’s\
    \ functional requirements or acceptance criteria specified in this SOW require\
    \ modification (for example, due to incorrect assumptions or changed requirements),\
    \ they will cooperate in good faith to execute a Change Order for such revised\
    \ requirements or acceptance criteria.  NOTE: Acceptance of User Stories developed\
    \ and demonstrated to Customer is an interactive process, to which the foregoing\
    \ does not apply.  Rather, Customer must formally accept User Stories in writing\
    \ (email acceptable).  In the event Customer neither accepts User Stories subject\
    \ to the foregoing, nor rejects User Stories in writing (email acceptable), then\
    \ such User Stories is deemed accepted at the earlier of ten (10) business days\
    \ after demonstration of the User Story or two (2) business days following the\
    \ end of the Sprint in which the User Story was completed. \n\nAcceptance of Professional\
    \ Services, including a Deliverable, will not affect Customer’s rights or remedies\
    \ under the “Warranty” section in the Agreement. \n\nProfessional Services Fees\n\
    \nFixed Fee Milestone-Based\n\nThe Professional Services are provided on a fixed\
    \ fee basis.  A Change Order may be required if there are changes to the project’s\
    \ scope, resources, schedule, milestones, Deliverables, complexity, or assignment\
    \ of new Customer project manager.  SFDC will invoice Customer upon acceptance\
    \ of each milestone.  Actual and reasonable T&E and taxes, if applicable is invoiced\
    \ monthly and payable in accordance with the terms of the Agreement.  \n\nThe\
    \ following table shows the planned milestones, target completion dates and billable\
    \ fees for each:₹\n\nTravel & Expense Requirements\n\nT&E is currently estimated\
    \ and capped at ₹40,00,000.00 and is included in the Fees set forth in this SOW.\
    \ SFDC will receive written approval (email sufficient) prior to travelling in\
    \ connection with Professional Services in accordance with the Salesforce Travel\
    \ and Expense policy.\n\nCustomer Tax Information\n\nTax/VAT#:  \n\nTax Exempt?\
    \ No\n\nCurrency: INR\n\nCustomer PO Requirements                            \
    \                           .\n\nA Purchase Order (“PO”) is required for the purchase\
    \ or payment of the services on this SOW. \n\nCustomer’s PO#: \n\nPO Amount: \n\
    \nSFDC Resources\n\nBillable\n\nAll work conducted by resources under this SOW\
    \ are considered billable Professional Services and are not related to entitlement\
    \ services provided by SFDC programs (e.g. Product Support, Customer Success,\
    \ etc.). Customer will submit and oversee general technical support cases to the\
    \ Salesforce support team associated with Customer’s use of the online services.\
    \  SFDC will not perform general technical support duties under this SOW. \n\n\
    Proficiency\n\nSFDC will provide proficiency on the Application exclusively and\
    \ makes no guarantee that resources are proficient in other programming languages\
    \ or platforms. \n\nAfterhours\n\nProfessional Services will be performed during\
    \ normal business hours (Monday – Friday, 8:30 a.m. - 5:30 p.m. in the time zone\
    \ of the location where the Professional Services resource is located, unless\
    \ otherwise agreed in writing by the parties (email sufficient)), excluding holidays.\
    \  Scheduling work outside of such normal business hours (“After-Hours Work”)\
    \ requires staffing considerations and needs to be planned at least twenty (20)\
    \ business days in advance of need. \n\nConsent to Use Subcontractors and Sub-processors\n\
    \nSFDC will be responsible for the performance of Professional Services by its\
    \ personnel, including subcontractors (if any), except as otherwise specified\
    \ herein. Customer agrees, by executing this SOW, that SFDC may use subcontractors\
    \ to perform the Professional Services.  If Customer provides SFDC access to Personal\
    \ Data, Customer agrees SFDC personnel and Affiliates (as applicable) may process\
    \ such Personal Data using the third-party cloud-based tools listed at https://www.salesforce.com/content/dam/web/en_us/www/documents/legal/Agreements/professional-service-agreements-and-terms/psa-infrastructure-and-subprocessors.pdf\
    \ as of the Effective Date. For purposes of this SOW, Personal Data means electronic\
    \ information relating to an identified or identifiable natural person, where\
    \ such data is provided to SFDC to perform the Professional Services. \n\nCustomer\
    \ Obligations \n\nSFDC expects to execute the activities outlined in this SOW\
    \ as an uninterrupted stream of work.  Timely performance of the Professional\
    \ Services pursuant to this SOW requires ongoing collaboration between SFDC and\
    \ Customer.  Customer is responsible for certain key tasks, contributions and\
    \ timely reviews to enable SFDC to perform its obligations under this SOW.  Delays\
    \ in the performance of the Professional Services caused by Customer may result\
    \ in additional applicable charges for resource time. SFDC shall not be responsible\
    \ for delays or other damages caused by Customer’s failure to meet its obligations.\
    \  \n\nCustomer Cooperation \n\nCustomer will cooperate with SFDC in its performance\
    \ of the Professional Services by, without limitation: \n\nWorking with Customer’s\
    \ stakeholders and implementation team and SFDC to determine mutually agreeable\
    \ timelines and resource schedules for the project;\n\nDelivering in a timely\
    \ manner Customer collateral and other obligations required under this SOW;\n\n\
    Responding promptly to SFDC’s inquiries related to the Professional Services;\
    \ \n\nProviding complete, accurate and timely information, data and feedback,\
    \ as reasonably required;\n\nWorking collaboratively with SFDC throughout the\
    \ project to mitigate risks, escalate and resolve issues quickly, and prioritize\
    \ efforts in order to achieve agreed timelines;\n\nCollaborating with SFDC to\
    \ validate that key tasks and schedule dependencies are aligned with the management\
    \ of the overall project;\n\nParticipating in formal checkpoints throughout the\
    \ project that is defined in the Planning Documents during the Define & Design\
    \ stage of the project;\n\nParticipating in weekly status meetings to review the\
    \ project status, risks, open issues and mitigation approach. The weekly status\
    \ meetings will include, but not be limited to, the following parties: Customer\
    \ Project Manager, Customer Product Owner, and SFDC Project Manager or Engagement\
    \ Manager\n\nCustomer Team\n\nCustomer will make available appropriately skilled\
    \ and knowledgeable Customer resources, including but not limited to the resources\
    \ as set forth below, to provide active and continuous participation, including\
    \ but not limited to timely review, feedback, approvals, and decision making.\
    \ All Customer resources engaged in the project will have an appropriate level\
    \ of familiarity with the Application, its standard capabilities and associated\
    \ terminology.\n\nExecutive Sponsor \n\nProvide thought leadership and overall\
    \ project guidance \n\nParticipate actively in Steering Committee meetings and\
    \ activities,  \n\nAct as a point of contact for escalations; and\n\nBe responsible\
    \ for executing on Customer’s overall, internal program management responsibilities.\n\
    \nProject/Program Manager \n\nAct as a single point of contact for SFDC’s engagement\
    \ activities; \n\nCo-manage the project plan and schedule with SFDC Project Manager;\
    \ \n\nBe responsible for identifying stakeholders and collaborating on scheduling\
    \ stakeholder activities;\n\nDefine and maintain the list of business objectives\
    \ and requirements to guide the Professional Services;\n\nResponsible for SFDC-related\
    \ requests, scheduling, enabling key decisions, communications, acceptance, or\
    \ issues;\n\nCoordinate Customer’s resources’ schedules, tasks, and stakeholder\
    \ availability for meetings; and\n\nCoordinate on-site meetings (if required).\n\
    \nProduct Owner \n\nResponsible for product vision and for maximizing the business\
    \ value of the implementation effort;\n\nRepresent Customer’s stakeholders throughout\
    \ project; \n\nManage the content of the product backlog;\n\nProvide content for\
    \ User Stories and assist with creation of acceptance criteria;\n\nPrioritize\
    \ stories in the product backlog;\n\nWork with SFDC to determine the order in\
    \ which stories will be implemented; and\n\nAccept each User Story upon demonstration\
    \ that it meets the acceptance criteria in accordance with Acceptance. \n\nBusiness\
    \ Subject Matter Experts \n\nHelp define the business requirements and test cases;\
    \ \n\nParticipate in the requirements and planning sessions; and\n\nBe responsible\
    \ for the User Acceptance Testing and Usability Testing.\n\nFunctional Lead \n\
    \nHelp define the system requirements and test cases; \n\nOversee and participate\
    \ in knowledge transfer; and\n\nBe responsible for the User Acceptance Testing\
    \ and Usability Testing.\n\nIT / Technology Lead\n\nProvide support, if needed,\
    \ for completing the Customer’s network configuration; \n\nProvide security requirements;\n\
    \nProvide Single-Sign On (SSO) support as needed; \n\nParticipate in architecture\
    \ discussions/decisions; \n\nHelp create test cases to support the technical requirements;\n\
    \nBe responsible for user acceptance, performance, and volume testing;\n\nOversee\
    \ and participate in knowledge transfer;\n\nProvide general support for network\
    \ and system access as required; and\n\nProvide ongoing operations support after\
    \ go-live.\n\nOrganizational Change Management Lead \n\nResponsible for Customer’s\
    \ change management activities, including but not limited to:\n\nConducting stakeholder\
    \ analysis; \n\nOverseeing communication plan around releases, organizational\
    \ change, and announcements;\n\nCommunicating change to end users; \n\nMonitoring\
    \ and ensuring end user adoption; and\n\nCapturing and measuring the actual business\
    \ value resulting from the Professional Services\n\nTraining Lead \n\nResponsible\
    \ for training Customer’s end-users, including but not limited to: \n\nDevelop\
    \ training strategy, material, and curriculum; \n\nAdminister the training of\
    \ end users including classroom or online logistics.\n\nAdditional Obligations\n\
    \nTechnology and Application Access\n\nCustomer will procure, install, host, test,\
    \ deploy, monitor and maintain equipment, infrastructure, hardware, software,\
    \ technical infrastructure, stable internet with sufficient bandwidth, security\
    \ access, and other technology, including patches and upgrades of each of the\
    \ foregoing, required to enable provisioning of the Professional Services.\n\n\
    Customer will identify and enable permissions for SFDC personnel as system administrators\
    \ or users of Customer's Application instances as reasonably necessary for the\
    \ provision of the Professional Services. SFDC may download log file data and\
    \ upload data files to perform its duties. \n\nSFDC will have access only to the\
    \ Customer’s Application and not to Customer’s non-SFDC systems including but\
    \ not limited to: internal enterprise platform, buying platforms, ad servers,\
    \ third-party applications, time logging systems, project management systems,\
    \ and defect management tools. If the parties mutually agree that such access\
    \ is necessary, Customer will provide sufficient access to Customer’s internal\
    \ systems (defect logs, JIRA, etc.) as required for SFDC to perform its obligations\
    \ hereunder.\n\nCustomer will revoke SFDC personnel's access to Customer’s Application\
    \ and internal systems (if any) at the conclusion of the SOW Term. Notwithstanding\
    \ the foregoing, SFDC reserves the right to revoke SFDC personnel's access to\
    \ Customer's Application unless such personnel are assigned to an existing Professional\
    \ Services engagement with Customer.\n\nSFDC may provide Customer access to specific\
    \ project tools during the SOW Term. Customer is responsible for transitioning\
    \ off of the applicable tools (e.g., exporting any data made available to the\
    \ tool) before the end of the SOW Term.\n\nCoordination and Location of Services\n\
    \nThe Professional Services described in this SOW is delivered virtually, unless\
    \ otherwise mutually agreed by the parties in writing (email sufficient). If work\
    \ is performed on-site at a facility of Customer or any of its Affiliates, then\
    \ Customer will provide, at no charge to SFDC, office workspace, suitably configured\
    \ computer equipment, stable internet with sufficient bandwidth, and access to\
    \ appropriate and knowledgeable employees and agents of Customer.  Work performed\
    \ on-site is subject to T&E in accordance with Section 4.\n\nData Availability\
    \ & Quality\n\nCustomer will have one or more of its data sources ready for import\
    \ prior to the start of the Professional Services.  \n\nExternal data imported\
    \ as part of automation must be in the SFDC defined format. \n\nCustomer will\
    \ provide SFDC with access to the data sources to be integrated and required end-points.\n\
    \nNon-API data sources is provided in the SFDC defined format.\n\nCustomer is\
    \ responsible for data quality, including but not limited to: \n\nData transformation,\
    \ cleansing, aggregation, merging, and de-duplication of Customer’s import or\
    \ exports; \n\nData configuration, extract processing, and quality assurance testing\
    \ of data prior to submitting to SFDC;\n\nDeletion or overwriting of data records;\
    \ and\n\nData integration tasks after the files reach their defined end points.\
    \ \n\nCreative Assets\n\nCustomer will identify, procure, and provide SFDC with\
    \ creative content, including but not limited to: \n\nCopywriting and language\
    \ translations;\n\nDesign, development, content, branding guidelines; and \n\n\
    Graphic assets including but not limited to:  fonts, logos, links, stock photography,\
    \ graphics, HTML code and .PSD files. \n\nUse of Services\n\nCustomer is responsible\
    \ for its use and distribution of the Application including any configuration\
    \ resulting from the Professional Services.\n\nThird Party Products and Services\
    \ \n\n“Third Party Products\" means products or services provided or procured\
    \ by Customer in connection with the Professional Services, including but not\
    \ limited to applications available in a Salesforce Marketplace (e.g., AppExchange).\
    \ SFDC is not responsible for and does not warrant Third Party Products. Customer\
    \ is responsible for (i) for the acquisition, licensing (including associated\
    \ costs) and use of any Third Party Products, (ii) unless otherwise defined as\
    \ in scope in Section 2, the integration with, and the installation, implementation\
    \ and configuration of such Third-Party Products, including any maintenance necessary\
    \ to support them, (iii) the coordination and management of  providers or vendors\
    \ of Third Party Products that may be involved in the project, and (iv) ensuring\
    \ that any Third Party Products and related infrastructure are in place within\
    \ reasonable time frames for the performance of the Professional Services. SFDC\
    \ will not have a direct line to providers of APIs or any of Customer’s third-party\
    \ vendors.\n\nCustomer will provide SFDC with sufficient access to contacts for\
    \ Third Party Products as necessary for SFDC to perform its obligations hereunder.\
    \ SFDC will take direction only from Customer and not from providers of Third\
    \ Party Products.\n\nGeneral Terms   \n\nChange Control\n\nIn the event of changes\
    \ in the scope of work or other terms of this SOW, the parties will work together\
    \ in good faith to agree upon an appropriate Change Order to this SOW following\
    \ the Change Control Process defined below.  SFDC shall have no obligation to\
    \ perform additional or modified Professional Services absent agreement on a Change\
    \ Order. \n\nThe Professional Services fees or SOW Term may be subject to equitable\
    \ adjustment via a Change Order in the event of a material change or deficiency\
    \ in the information Customer provides to SFDC, an unanticipated event that materially\
    \ changes Customer’s service needs or requirements, a change in law, regulation\
    \ or enforcement affecting the Professional Services, or a force majeure event.\
    \ \n\nChange Control Definitions\n\n“Change Control” describes the process for\
    \ managing potential project changes.\n\n“Change Request” is an informal request\
    \ by Customer or SFDC to modify the scope or schedule or Fees pursuant to this\
    \ SOW.\n\n“Change Order” is a formal amendment to this SOW as defined in Section\
    \ 1.4.\n\nChange Control Process\n\nSFDC shall continue performing the Professional\
    \ Services in accordance with this SOW until the parties agree in writing on the\
    \ change in scope of work, resources, scheduling, fees, and other applicable terms.\
    \ The following provides a summary of the process to follow if a change to this\
    \ SOW is desired:\n\nCustomer or SFDC submits a written (email acceptable) Change\
    \ Request, including the following:  (i) change description, detailing what is\
    \ requested to be amended in this SOW; (ii) rationale for the change; and (iii)\
    \ impact the change may have on the Professional Services.\n\nBoth Customer and\
    \ SFDC review the Change Request to determine the merits of the request and the\
    \ impact on the scope, resources, schedule, fees, and other terms and conditions\
    \ of this SOW that may result from the implementation of the Change Request. \
    \ \n\nThe parties decide either to accept or to reject the requested change.\n\
    \nIf accepted, SFDC prepares a Change Order, which includes a description of the\
    \ applicable changes to scope, planned resources, timeline, fees, and other terms\
    \ and conditions. \n\nSFDC executes the Change Order and sends it to Customer.\n\
    \nCustomer executes the Change Order, and, if applicable, generates a purchase\
    \ order associated with that Change Order. \n\nThe Professional Services described\
    \ in the fully executed Change Order is performed by SFDC and included as part\
    \ of this SOW. \n\nSegmentation  \n\nCustomer acknowledges that this SOW is limited\
    \ to the Professional Services and does not convey any right to use the Application.\
    \  Any use of the Application by Customer is governed by a separate agreement.\
    \  Customer agrees that its purchase of the Professional Services is not contingent\
    \ on the delivery of any future Application functionality or features (other than\
    \ Deliverables under this SOW in accordance with and subject to the terms of this\
    \ SOW), or on any oral or written public comments by SFDC regarding future Application\
    \ functionality or features.\n\nTermination \n\nThis SOW is not terminable for\
    \ convenience.  Either party may terminate this SOW for cause: (i) upon thirty\
    \ (30) days written notice to the other party of a material breach if such breach\
    \ remains uncured at the expiration of such period or (ii) if the other party\
    \ becomes the subject of a petition in bankruptcy or any other proceeding relating\
    \ to insolvency, receivership, liquidation or assignment for the benefit of creditors.\n\
    \nGeneral\n\nThis SOW may be signed in counterparts, each of which shall be deemed\
    \ an original. This SOW is subject to the terms and conditions of the Agreement,\
    \ except to the extent otherwise expressly set forth in this SOW. In the event\
    \ of a conflict between any term of this SOW and the Agreement, the terms of this\
    \ SOW will control.  \n\nIN WITNESS WHEREOF, the parties have caused this SOW\
    \ to be executed by their respective duly authorized representatives as identified\
    \ below.\n\nAppendix 1\n\nThe below is an indicative program timeline based on\
    \ our current understanding. Composition and release dates of individual releases\
    \ are subject to change due to the outcome of discovery & design activities."
